function glyphPieces(pattern) {
  const cell = 10;
  const gap = 1.4;
  const slant = 5;
  const pieces = [];
  pattern.forEach((row, rowIndex) => {
    row.split("").forEach((active, colIndex) => {
      if (active !== "1") return;
      const x = colIndex * (cell + gap) + rowIndex * 0.72;
      const y = rowIndex * (cell + gap);
      pieces.push(`${x + slant},${y} ${x + cell + slant},${y} ${x + cell},${y + cell} ${x},${y + cell}`);
    });
  });
  return pieces;
}

function go(page) {
  window.location.hash = page;
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function goTo(page, params = {}) {
  const query = new URLSearchParams(params).toString();
  window.location.hash = query ? `${page}?${query}` : page;
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function parseRoute(hashValue) {
  const cleaned = (hashValue || "#home").replace(/^#/, "") || "home";
  const [page, query = ""] = cleaned.split("?");
  return {
    page: page || "home",
    params: Object.fromEntries(new URLSearchParams(query))
  };
}

function goToServices() {
  goTo("home", { focus: "services" });
}

function useIsMobile() {
  const [mobile, setMobile] = useState(() => window.innerWidth < 768);

  useEffect(() => {
    const onResize = () => setMobile(window.innerWidth < 768);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  return mobile;
}

  const pattern = glitchGlyphPatterns[char];
  if (!pattern) {
    return h("span", { className: "glitch-fallback-char" }, char);
  }

  const pieces = glyphPieces(pattern);
  return h("svg", {
    className: `glitch-glyph-svg glitch-glyph-${layer}`,
    viewBox: "0 0 66 82",
    preserveAspectRatio: "xMidYMid meet",
    "aria-hidden": true
  },
    pieces.map((points, index) => h("polygon", { key: index, points })),
    h("polygon", { className: "glitch-glyph-cut", points: "48,4 54,4 18,82 12,82" }),
    h("polygon", { className: "glitch-glyph-streak", points: "0,34 60,29 60,34 0,39" })
  );
}

function SummerSaleBar() {
  const saleEndsAt = useMemo(() => new Date("2026-06-02T23:59:59-05:00").getTime(), []);
  const [remaining, setRemaining] = useState(() => Math.max(0, saleEndsAt - Date.now()));

  useEffect(() => {
    const tick = () => setRemaining(Math.max(0, saleEndsAt - Date.now()));
    tick();
    const timer = window.setInterval(tick, 1000);
    return () => window.clearInterval(timer);
  }, [saleEndsAt]);

  const days = Math.floor(remaining / 86400000);
  const hours = Math.floor((remaining % 86400000) / 3600000);
  const minutes = Math.floor((remaining % 3600000) / 60000);
  const seconds = Math.floor((remaining % 60000) / 1000);
  const timeParts = [
    ["Days", days],
    ["Hours", hours],
    ["Min", minutes],
    ["Sec", seconds]
  ];

  return h("section", { className: "summer-sale-bar sticky top-[4.55rem] z-30 px-3 py-2 md:top-[4.85rem]" },
    h("div", { className: "flex w-full flex-row items-center justify-between gap-2 px-3 py-1 sm:px-6" },
      h("div", { className: "flex min-w-0 flex-col items-start gap-1 text-left" },
        h("p", { className: "font-display text-sm font-black uppercase leading-none tracking-normal text-white sm:text-base" }, "Summer Sale Starts Soon"),
        h("p", { className: "text-[0.5rem] font-black uppercase leading-none tracking-[0.18em] text-raceorange sm:text-[0.56rem]" }, "30% off any service")
      ),
      h("div", { className: "flex items-center gap-1.5 sm:gap-2" },
        timeParts.map(([label, value]) =>
          h("div", { key: label, className: "summer-countdown-cell" },
            h("span", { className: "font-display text-sm font-black leading-none text-white sm:text-base" }, String(value).padStart(2, "0")),
            h("span", { className: "text-[0.46rem] font-black uppercase tracking-[0.12em] text-cyanedge sm:text-[0.5rem]" }, label)

        )

  );
}

  const availableAddOns = addOnOptions.filter((item) => (serviceAddOnAvailability[service.slug] || []).includes(item.label));

  const [selectedAddOns, setSelectedAddOns] = useState([]);

  useEffect(() => {
    if (options.length && !options.some((option) => option.label === selectedOption)) {
      setSelectedOption(options[0].label);

  useEffect(() => {
    setSelectedAddOns((current) => current.filter((label) => availableAddOns.some((item) => item.label === label)));

    if (!selectedOption) return;
    const timer = window.setTimeout(() => {
      const form = document.getElementById("service-request-form");
      if (form) {
        form.scrollIntoView({ behavior: "smooth", block: "start" });
      }

    return () => window.clearTimeout(timer);

  const activeOption = options.find((option) => option.label === selectedOption) || options[0];

            const selected = selectedAddOns.includes(item.label);
            return h("button", {
              key: `${service.slug}-${item.label}-addon`,
              type: "button",
              onClick: () => setSelectedAddOns((current) => current.includes(item.label) ? current.filter((label) => label !== item.label) : [...current, item.label]),
              className: `service-addon-card rounded-[1.25rem] border px-4 py-4 text-left transition ${

                h("p", { className: "service-option-price service-addon-price font-display uppercase leading-none text-raceorange" }, item.price)

    h(Section, { className: "relative min-h-[100vh] overflow-hidden py-8 md:py-12" },

function MembershipPage() {
  const vehicles = [
    { label: "Coupes", lookup: { exterior: "Coupe", interior: "Coupe", full: "Coupe" } },
    { label: "Sedans", lookup: { exterior: "Sedan", interior: "Sedan", full: "Sedan" } },
    { label: "Small SUVs", lookup: { exterior: "SUV", interior: "Small SUV", full: "Small SUV" } },
    { label: "Large SUVs", lookup: { exterior: "SUV", interior: "Large SUV", full: "Large SUV" } },
    { label: "Trucks", lookup: { exterior: "Truck / Van", interior: "Large Truck", full: "Large Truck" } },
    { label: "Utility Trucks / Vans", lookup: { exterior: "Truck / Van", interior: "Utility Truck / Van", full: "Utility Truck / Van" } }
  ];
  const services = [
    {
      id: "exterior",
      label: "Exterior",
      serviceSlug: "exterior-wash-wax",
      copy: "Routine exterior maintenance for paint, wheels, road film, and gloss.",
      perks: ["Recurring exterior refresh", "Gloss and wax upkeep", "Road grime kept under control"],
      monthlyDiscount: 0.1,
      biweeklyDiscount: 0.2
    },
    {
      id: "interior",
      label: "Interior",
      serviceSlug: "interior-detail",
      copy: "Consistent cabin care for seats, carpets, touchpoints, trim, and glass.",
      perks: ["Cleaner cabin feel", "Seats and carpets maintained", "High-touch areas refreshed"],
      monthlyDiscount: 0.1,
      biweeklyDiscount: 0.2
    },
    {
      id: "full",
      label: "Full Detail",
      serviceSlug: "full-detail",
      copy: "A complete inside-and-out maintenance plan for the strongest recurring reset.",
      perks: ["Interior and exterior care", "Best all-around upkeep", "Showroom-style maintenance"],
      monthlyDiscount: 0.2,
      biweeklyDiscount: 0.3
    }
  ];
  const [selectedVehicle, setSelectedVehicle] = useState(vehicles[0].label);
  const [selectedService, setSelectedService] = useState(services[2].id);
  const vehicle = vehicles.find((item) => item.label === selectedVehicle) || vehicles[0];
  const service = services.find((item) => item.id === selectedService) || services[0];
  const baseOption = (serviceVehicleOptions[service.serviceSlug] || []).find((option) => option.label === vehicle.lookup[service.id]);
  const basePrice = baseOption ? Number(baseOption.price.replace(/[^0-9.]/g, "")) : 0;
  const formatPrice = (value) => `$${Math.round(value)}`;
  const monthlyPrice = formatPrice(basePrice * (1 - service.monthlyDiscount));
  const biweeklyPrice = formatPrice(basePrice * (1 - service.biweeklyDiscount));

  return h(PageShell, {
    eyebrow: "Membership",
    title: "Detail Memberships",
    intro: "Choose your vehicle, pick the type of detail you want maintained, and compare monthly or biweekly member pricing."
  },
    h("div", { className: "grid gap-6" },
      h("div", { className: "glass-panel rounded-[1.7rem] p-5 md:p-6" },
        h("p", { className: "mb-4 text-xs font-black uppercase tracking-[0.32em] text-cyanedge" }, "Vehicle Type"),
        h("div", { className: "flex flex-wrap gap-3" },
          vehicles.map((item) =>
            h("button", {
              key: item.label,
              type: "button",
              onClick: () => setSelectedVehicle(item.label),
              className: `rounded-full border-2 px-4 py-2 text-xs font-black uppercase tracking-[0.16em] transition ${
                item.label === selectedVehicle
                  ? "border-transparent bg-[linear-gradient(135deg,rgba(44,129,255,.95),rgba(32,244,255,.78)_45%,rgba(255,138,42,.9))] text-white shadow-[0_0_22px_rgba(32,244,255,.18)]"
                  : "border-cyanedge/35 bg-black/25 text-slate-300 hover:border-raceorange/60 hover:text-white"
              }`
            }, item.label)
          )
        )
      ),
      h("div", { className: "grid gap-4 md:grid-cols-3" },
        services.map((item) =>
          h("button", {
            key: item.id,
            type: "button",
            onClick: () => setSelectedService(item.id),
            className: `glass-panel rounded-[1.4rem] p-6 text-left transition ${
              item.id === selectedService ? "shadow-[0_0_0_1px_rgba(32,244,255,.55),0_0_32px_rgba(255,138,42,.12)]" : "opacity-82 hover:opacity-100"
            }`
          },
            h("p", { className: "text-xs font-black uppercase tracking-[0.3em] text-raceorange" }, "Membership Tier"),
            h("h2", { className: "mt-4 font-display text-4xl font-black uppercase leading-none text-white" }, item.label),
            h("p", { className: "mt-4 text-sm leading-6 text-slate-300" }, item.copy)
          )
        )
      ),
      h("div", { className: "glass-panel rounded-[1.7rem] p-6 md:p-8" },
        h("div", { className: "grid gap-6 lg:grid-cols-[0.85fr_1.15fr]" },
          h("div", null,
            h("p", { className: "text-xs font-black uppercase tracking-[0.32em] text-cyanedge" }, `${selectedVehicle} | ${service.label}`),
            h("h2", { className: "mt-4 leading-none" }, h(GlitchText, { text: "Member Pricing", size: "section", intensity: 0.9 })),
            h("p", { className: "mt-5 text-base leading-7 text-slate-300" }, `Base price: ${baseOption ? baseOption.price : "Quote"}. Membership pricing below is calculated from the selected vehicle and service.`),
            h("div", { className: "mt-6 grid gap-3" },
              service.perks.map((perk) =>
                h("div", { key: perk, className: "flex items-center gap-3 rounded-2xl border border-white/10 bg-white/[0.03] px-4 py-3" },
                  h("span", { className: "h-2.5 w-2.5 rounded-full bg-cyanedge shadow-[0_0_12px_rgba(32,244,255,.55)]" }),
                  h("p", { className: "text-sm font-semibold text-slate-200" }, perk)
                )
              )
            )
          ),
          h("div", { className: "grid gap-4 md:grid-cols-2" },
            h("article", { className: "rounded-[1.4rem] border border-cyanedge/30 bg-black/30 p-6" },
              h("p", { className: "text-xs font-black uppercase tracking-[0.3em] text-cyanedge" }, "Monthly"),
              h("h3", { className: "mt-4 font-display text-5xl font-black uppercase leading-none text-white" }, monthlyPrice),
              h("p", { className: "mt-3 font-display text-3xl font-black uppercase leading-none text-raceorange" }, `${Math.round(service.monthlyDiscount * 100)}% off`),
              h("p", { className: "mt-4 text-sm leading-6 text-slate-300" }, "Best for a steady monthly maintenance rhythm."),
              h("button", { className: "mt-6 w-full rounded-full border-2 border-cyanedge/70 bg-cyanedge px-4 py-3 text-sm font-black uppercase tracking-[0.16em] text-asphalt shadow-glow" }, "Select Monthly")
            ),
            h("article", { className: "rounded-[1.4rem] border border-raceorange/35 bg-black/30 p-6" },
              h("p", { className: "text-xs font-black uppercase tracking-[0.3em] text-raceorange" }, "Biweekly"),
              h("h3", { className: "mt-4 font-display text-5xl font-black uppercase leading-none text-white" }, biweeklyPrice),
              h("p", { className: "mt-3 font-display text-3xl font-black uppercase leading-none text-raceorange" }, `${Math.round(service.biweeklyDiscount * 100)}% off`),
              h("p", { className: "mt-4 text-sm leading-6 text-slate-300" }, "Best for vehicles that need more frequent care."),
              h("button", { className: "mt-6 w-full rounded-full border-2 border-raceorange/70 bg-[linear-gradient(135deg,#20f4ff,#ff8a2a)] px-4 py-3 text-sm font-black uppercase tracking-[0.16em] text-white shadow-orange" }, "Select Biweekly")
            )
          )
        )
      )
    )
  );
}

function PageShell({ eyebrow, title, intro, children }) {
  return h("main", null,
    h(Section, { className: "min-h-[70vh] topographic" },
      h("div", { className: "mb-10 max-w-4xl" },
        h("p", { className: "text-xs font-black uppercase tracking-[0.3em] text-raceorange" }, eyebrow),
        h("h1", { className: "mt-4 leading-none" }, h(GlitchText, { text: title, size: "section", intensity: 0.95 })),
        h("p", { className: "mt-5 text-lg leading-8 text-slate-300" }, intro)
      ),
      children
    )
  );
}

function Footer() {
  return h("footer", { className: "border-t border-white/10 bg-black/70 px-4 py-10 sm:px-6 lg:px-8" },
    h("div", { className: "mx-auto grid max-w-7xl gap-8 md:grid-cols-[1fr_auto]" },
      h("div", null, h("h2", { className: "leading-none" }, h(GlitchText, { text: "Downforce", size: "card", intensity: 0.78, animated: false })), h("p", { className: "mt-2 font-semibold text-cyanedge" }, "We don't just clean, we perfect.")),
      h("div", { className: "grid gap-3 text-sm font-bold uppercase tracking-[0.14em] text-slate-300 sm:grid-cols-3" },
        ["Privacy Policy", "Terms of Service", "Instagram", "Contact", "Service Area"].map((item) => h("a", { key: item, href: "#home", className: "hover:text-raceorange" }, item))
      )
    )
  );
}

function App() {
  const [route, setRoute] = useState(() => parseRoute(window.location.hash));
  const [intro, setIntro] = useState(true);

  useEffect(() => {
    const update = () => setRoute(parseRoute(window.location.hash));
    window.addEventListener("hashchange", update);
    const timer = window.setTimeout(() => setIntro(false), 3450);
    return () => {
      window.removeEventListener("hashchange", update);
      window.clearTimeout(timer);
    };
  }, []);

  const service = useMemo(() => {
    const slug = route.page.startsWith("service/") ? route.page.split("/")[1] : "";
    return servicePages.find((item) => item.slug === slug);
  }, [route.page]);

  let content = h(HomePage);
  if (route.page === "book") content = h(BookingPage, { selectedService: route.params.service });
  if (route.page === "gallery") content = h(GalleryPage);
  if (route.page === "about") content = h(WhyUsPage);
  if (route.page === "addons") content = h(AddonsPage);
  if (route.page === "products") content = h(ProductsPage);
  if (route.page === "why-us") content = h(WhyUsPage);
  if (route.page === "membership") content = h(MembershipPage);
  if (service) content = h(ServiceRequestPage, { service });

  return h(React.Fragment, null,
    h(AnimatePresence, null, intro && h(GarageIntro)),
    h(Header, { page: route.page }),
    h(SummerSaleBar),
    h(AnimatePresence, { mode: "wait" },
      h(motion.div, { key: window.location.hash || route.page, initial: { opacity: 0, y: 18 }, animate: { opacity: 1, y: 0 }, exit: { opacity: 0, y: -12 }, transition: { duration: 0.35 } }, content)
    ),
    h(Footer)
  );
}

createRoot(document.getElementById("root")).render(h(App));

    </script>
  </body>
</html>
